[project]
name = "alt-python-pydbc-pg"
version = "0.1.0"
description = "pydbc driver for PostgreSQL — wraps psycopg2 (pyformat paramstyle)"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "alt-python-pydbc-core",
    "psycopg2-binary>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pydbc_pg"]

[tool.uv.sources]
alt-python-pydbc-core = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
