[project]
name = "alt-python-pydbc-pg"
version = "1.1.0"
description = "pydbc driver for PostgreSQL — wraps psycopg2 (pyformat paramstyle)"
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
license-files = ["LICENSE"]
authors = [
    {name = "Craig Parravicini"},
    {name = "Claude (Anthropic)"},
]
keywords = ["database", "db-api", "jdbc", "sql", "sqlite", "postgresql", "mysql", "mssql"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Database",
    "Topic :: Database :: Front-Ends",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "alt-python-pydbc-core",
    "psycopg2-binary>=2.9",
]

[project.urls]
Homepage = "https://github.com/alt-python/pydbc"
Repository = "https://github.com/alt-python/pydbc"
Documentation = "https://github.com/alt-python/pydbc/blob/main/docs/getting-started.md"
"Bug Tracker" = "https://github.com/alt-python/pydbc/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pydbc_pg"]

[tool.uv.sources]
alt-python-pydbc-core = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
