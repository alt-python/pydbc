[project]
name = "alt-python-pydbc-mssql"
version = "0.1.0"
description = "pydbc driver for Microsoft SQL Server — wraps pymssql"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "alt-python-pydbc-core",
    "pymssql>=2.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pydbc_mssql"]

[tool.uv.sources]
alt-python-pydbc-core = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
