[project]
name = "alt-python-pydbc-sqlite"
version = "0.1.0"
description = "pydbc driver for SQLite — wraps stdlib sqlite3 (qmark paramstyle)"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "alt-python-pydbc-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pydbc_sqlite"]

[tool.uv.sources]
alt-python-pydbc-core = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
