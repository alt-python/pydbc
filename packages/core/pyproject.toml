[project]
name = "alt-python-pydbc-core"
version = "0.1.0"
description = "Core abstraction hierarchy for pydbc — Driver, DriverManager, Connection, Statement, PreparedStatement, ResultSet, DataSource"
readme = "README.md"
requires-python = ">=3.12"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pydbc_core"]

[tool.pytest.ini_options]
testpaths = ["tests"]
