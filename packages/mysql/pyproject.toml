[project]
name = "alt-python-pydbc-mysql"
version = "0.1.0"
description = "pydbc driver for MySQL — wraps PyMySQL (format paramstyle)"
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
license-files = ["LICENSE"]
authors = [
    {name = "Craig Parra", email = "craigparra@gmail.com"},
]
keywords = ["database", "db-api", "jdbc", "sql", "sqlite", "postgresql", "mysql", "mssql"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Database",
    "Topic :: Database :: Front-Ends",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "alt-python-pydbc-core",
    "pymysql>=1.0.2",
    "cryptography>=41.0",
]

[project.urls]
Homepage = "https://github.com/alt-python/pydbc"
Repository = "https://github.com/alt-python/pydbc"
Documentation = "https://github.com/alt-python/pydbc/blob/main/docs/getting-started.md"
"Bug Tracker" = "https://github.com/alt-python/pydbc/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pydbc_mysql"]

[tool.uv.sources]
alt-python-pydbc-core = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
