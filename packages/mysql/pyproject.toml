[project]
name = "alt-python-pydbc-mysql"
version = "0.1.0"
description = "pydbc driver for MySQL — wraps PyMySQL (format paramstyle)"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "alt-python-pydbc-core",
    "pymysql>=1.0.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pydbc_mysql"]

[tool.uv.sources]
alt-python-pydbc-core = { workspace = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
