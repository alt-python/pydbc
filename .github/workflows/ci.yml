name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-packages

      # Core and SQLite tests run without Docker.
      # pg, mysql, mssql, oracle conftest fixtures call pytest.skip when
      # Docker is unavailable, so those packages are excluded here.
      - name: Run core tests
        run: uv run pytest packages/core/tests/ -v

      - name: Run sqlite tests
        run: uv run pytest packages/sqlite/tests/ -v
