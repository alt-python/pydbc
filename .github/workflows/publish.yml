name: Publish

on:
  release:
    types: [published]

jobs:
  test:
    name: Test before publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run core tests
        run: uv run pytest packages/core/tests/ -v

      - name: Run sqlite tests
        run: uv run pytest packages/sqlite/tests/ -v

  publish:
    name: Publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build packages
        run: |
          uv build --package alt-python-pydbc-core
          uv build --package alt-python-pydbc-sqlite
          uv build --package alt-python-pydbc-pg
          uv build --package alt-python-pydbc-mysql
          uv build --package alt-python-pydbc-mssql
          uv build --package alt-python-pydbc-oracle

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.UV_PUBLISH_TOKEN }}
        run: uv publish dist/*
